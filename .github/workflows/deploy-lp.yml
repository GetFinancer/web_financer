name: Deploy LP to release-lp branch

on:
  push:
    branches:
      - main
    paths:
      - 'lp/**'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Prepare release-lp branch
        run: |
          if git ls-remote --exit-code origin release-lp; then
            git checkout -B release-lp origin/release-lp
          else
            git checkout --orphan release-lp
            git rm -rf .
          fi

          # Alles löschen außer .git
          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            -exec rm -rf {} +

          # Nur lp/ Inhalt aus main übernehmen
          git checkout main -- lp/
          cp -r lp/. .
          rm -rf lp

      - name: Commit and push to release-lp
        run: |
          git add .
          git commit -m "Deploy LP from main (${GITHUB_SHA})" || echo "Nothing to commit"
          git push origin release-lp --force
